<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>UniEventos AR</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
    }

    #ui-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 12px 16px;
      background: linear-gradient(to bottom, rgba(0, 0, 0, 0.7), transparent);
      z-index: 999;
      color: white;
      font-family: 'Segoe UI', sans-serif;
      font-size: 14px;
    }

    #status {
      opacity: 0.8;
    }
  </style>
</head>

<body>
  <div id="ui-overlay">
    <div style="font-weight: bold; font-size: 16px;">🎯 UniEventos AR</div>
    <div id="status">Iniciando GPS...</div>
  </div>

  <a-scene vr-mode-ui="enabled: false" arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false"
    renderer="antialias: true; alpha: true">
    <a-camera gps-projected-camera rotation-reader></a-camera>
  </a-scene>

  <script>
    const API_URL = 'https://unieventos-s25a.onrender.com/eventos/ar';
    let miLatitud = null;
    let miLongitud = null;
    let eventosEntidades = [];
    let eventosData = [];

    // Iniciar GPS
    navigator.geolocation.watchPosition(pos => {
      miLatitud = pos.coords.latitude;
      miLongitud = pos.coords.longitude;
      document.getElementById('status').textContent = `GPS listo · ${pos.coords.accuracy.toFixed(0)}m precisión`;
      actualizarDistancias();
    }, err => {
      document.getElementById('status').textContent = 'Error GPS: ' + err.message;
    }, {
      enableHighAccuracy: true,
      maximumAge: 1000,
      timeout: 10000
    });

    function calcularDistancia(lat2, lng2) {
      if (miLatitud === null) return null;
      const R = 6371000;
      const dLat = (lat2 - miLatitud) * Math.PI / 180;
      const dLng = (lng2 - miLongitud) * Math.PI / 180;
      const a = Math.sin(dLat / 2) ** 2 +
        Math.cos(miLatitud * Math.PI / 180) *
        Math.cos(lat2 * Math.PI / 180) *
        Math.sin(dLng / 2) ** 2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function formatDistancia(metros) {
      if (metros === null) return '...';
      if (metros < 1000) return `${Math.round(metros)} m`;
      return `${(metros / 1000).toFixed(1)} km`;
    }

    function actualizarDistancias() {
      eventosEntidades.forEach((entity, i) => {
        const evento = eventosData[i];
        const dist = calcularDistancia(evento.latitud, evento.longitud);

        const distText = entity.querySelector('.dist-text');
        if (distText) {
          distText.setAttribute('value', formatDistancia(dist));
        }

        if (dist !== null && dist < 50) {
          // Muy cerca — GPS impreciso, mostrar mensaje de llegada
          entity.setAttribute('visible', 'false');
          document.getElementById('status').textContent = `✅ Ya llegaste a: ${evento.titulo}`;
        } else if (dist !== null && dist > 200) {
          // Muy lejos — ocultar indicador
          entity.setAttribute('visible', 'false');
        } else {
          // Rango ideal entre 50 y 200 metros
          entity.setAttribute('visible', 'true');
          document.getElementById('status').textContent = `${eventosData.length} evento(s) encontrado(s)`;
        }
      });
    }

    async function cargarEventos() {
      try {
        document.getElementById('status').textContent = 'Cargando eventos...';
        const res = await fetch(API_URL);
        const eventos = await res.json();
        const scene = document.querySelector('a-scene');

        if (eventos.length === 0) {
          document.getElementById('status').textContent = 'No hay eventos hoy';
          return;
        }

        document.getElementById('status').textContent = `${eventos.length} evento(s) encontrado(s)`;

        eventos.forEach(evento => {
          const entity = document.createElement('a-entity');
          entity.setAttribute('gps-projected-entity-place', `latitude: ${evento.latitud}; longitude: ${evento.longitud}`);
          entity.setAttribute('look-at', '[gps-projected-camera]');
          entity.setAttribute('scale', '20 20 20');

          // Fondo con bordes redondeados
          const fondo = document.createElement('a-rounded');
          fondo.setAttribute('color', '#0f0f2e');
          fondo.setAttribute('opacity', '0.9');
          fondo.setAttribute('width', '3.2');
          fondo.setAttribute('height', '1.8');
          fondo.setAttribute('position', '0 0 0');

          // Línea superior de color
          const linea = document.createElement('a-plane');
          linea.setAttribute('color', '#6c63ff');
          linea.setAttribute('width', '3.2');
          linea.setAttribute('height', '0.08');
          linea.setAttribute('position', '0 0.86 0.01');

          // Título
          const titulo = document.createElement('a-text');
          titulo.setAttribute('value', evento.titulo);
          titulo.setAttribute('color', '#ffffff');
          titulo.setAttribute('align', 'center');
          titulo.setAttribute('position', '0 0.55 0.01');
          titulo.setAttribute('width', '3');
          titulo.setAttribute('font', 'roboto');
          titulo.setAttribute('wrap-count', '25');

          // Separador
          const sep = document.createElement('a-plane');
          sep.setAttribute('color', '#ffffff');
          sep.setAttribute('opacity', '0.15');
          sep.setAttribute('width', '2.8');
          sep.setAttribute('height', '0.02');
          sep.setAttribute('position', '0 0.2 0.01');

          // Ícono lugar
          const lugar = document.createElement('a-text');
          lugar.setAttribute('value', `📍 ${evento.lugar_nombre}`);
          lugar.setAttribute('color', '#a0a0ff');
          lugar.setAttribute('align', 'center');
          lugar.setAttribute('position', '0 0 0.01');
          lugar.setAttribute('width', '2.8');
          lugar.setAttribute('font', 'roboto');

          // Hora
          const hora = document.createElement('a-text');
          hora.setAttribute('value', `🕐 ${evento.hora_inicio.slice(0, 5)} - ${evento.hora_fin.slice(0, 5)}`);
          hora.setAttribute('color', '#80ffcc');
          hora.setAttribute('align', 'center');
          hora.setAttribute('position', '0 -0.35 0.01');
          hora.setAttribute('width', '2.8');
          hora.setAttribute('font', 'roboto');

          // Distancia
          const dist = document.createElement('a-text');
          dist.setAttribute('value', '...');
          dist.setAttribute('color', '#ffcc00');
          dist.setAttribute('align', 'center');
          dist.setAttribute('position', '0 -0.7 0.01');
          dist.setAttribute('width', '2.8');
          dist.setAttribute('font', 'roboto');
          dist.classList.add('dist-text');

          entity.appendChild(fondo);
          entity.appendChild(linea);
          entity.appendChild(titulo);
          entity.appendChild(sep);
          entity.appendChild(lugar);
          entity.appendChild(hora);
          entity.appendChild(dist);
          scene.appendChild(entity);

          eventosEntidades.push(entity);
          eventosData.push(evento);
        });

      } catch (err) {
        console.error('Error:', err);
        document.getElementById('status').textContent = 'Error cargando eventos';
      }
    }

    document.querySelector('a-scene').addEventListener('loaded', cargarEventos);
  </script>
</body>

</html>
